const ARCHETYPES = [
  { id: "balanced", weight: 0.30 },
  { id: "bpa", weight: 0.15 },
  { id: "contender", weight: 0.15 },
  { id: "rebuilder", weight: 0.15 },
  { id: "qb_needy", weight: 0.08 },
  { id: "rb_needy", weight: 0.08 },
  { id: "wr_needy", weight: 0.08 },
];

function weightedRandomArchetype() {
  const r = Math.random();
  let c = 0;
  for (const a of ARCHETYPES) { c += a.weight; if (r <= c) return a.id; }
  return "balanced";
}

function fmtPick(round, pick) {
  return round + "." + String(pick).padStart(2, "0");
}

// ============================================================================
// DRAFT ENGINE
// ============================================================================
function buildAdjustedBoard(settings) {
  let players = SUPERFLEX_RANKINGS.map(p => ({ ...p, adjValue: p.value }));

  if (!settings.superflex) {
    players = players.map(p => p.pos === "QB" ? { ...p, adjValue: Math.round(p.value * 0.55) } : p);
  }

  if (settings.scoring === "ppr") {
    players = players.map(p => {
      if (p.pos === "WR") return { ...p, adjValue: Math.round(p.adjValue * 1.05) };
      if (p.pos === "RB") return { ...p, adjValue: Math.round(p.adjValue * 1.03) };
      return p;
    });
  } else if (settings.scoring === "standard") {
    players = players.map(p => p.pos === "RB" ? { ...p, adjValue: Math.round(p.adjValue * 1.07) } : p);
  }

  const tepMult = { off: 1, "te+": 1.20, "te++": 1.40, "te+++": 1.60 }[settings.tePremium] || 1;
  if (tepMult > 1) players = players.map(p => p.pos === "TE" ? { ...p, adjValue: Math.round(p.adjValue * tepMult) } : p);

  if (settings.numWR === 3) {
    players = players.map(p => (p.pos === "WR" && p.rank >= 8 && p.rank <= 30) ? { ...p, adjValue: Math.round(p.adjValue * 1.08) } : p);
  }
  if (settings.numRB === 2) {
    players = players.map(p => p.pos === "RB" ? { ...p, adjValue: Math.round(p.adjValue * 1.05) } : p);
  }
  if (settings.numFlex === 2) {
    players = players.map(p => ((p.pos === "WR" || p.pos === "RB") && p.rank >= 15 && p.rank <= 40) ? { ...p, adjValue: Math.round(p.adjValue * 1.03) } : p);
  }

  players.sort((a, b) => b.adjValue - a.adjValue);
  return players.map((p, i) => ({ ...p, adjRank: i + 1 }));
}

function generateTeamProfiles(leagueSize, userSlot) {
  const profiles = [];
  for (let i = 1; i <= leagueSize; i++) {
    profiles.push(i === userSlot
      ? { team: i, isUser: true, archetype: null, aggressiveness: 0 }
      : { team: i, isUser: false, archetype: weightedRandomArchetype(), aggressiveness: Math.random() }
    );
  }
  return profiles;
}

function generateDraftOrder(leagueSize, numRounds) {
  const order = [];
  for (let r = 1; r <= numRounds; r++) {
    for (let p = 1; p <= leagueSize; p++) order.push({ round: r, pick: p, team: p });
  }
  return order.map((o, i) => ({ ...o, overall: i + 1 }));
}

function aiMakePick(available, profile, settings) {
  if (!available.length) return null;
  const sorted = [...available].sort((a, b) => b.adjValue - a.adjValue);

  let windowSize = 5;
  if (profile.aggressiveness < 0.3) windowSize = 3;
  else if (profile.aggressiveness > 0.7) windowSize = 8;
  const win = sorted.slice(0, Math.min(windowSize, sorted.length));

  const biased = win.map(p => {
    let bias = 1.0;
    const a = profile.archetype;
    if (a === "rb_needy" && p.pos === "RB") bias = 1.15;
    else if (a === "wr_needy" && p.pos === "WR") bias = 1.10;
    else if (a === "qb_needy" && p.pos === "QB") bias = settings.superflex ? 1.25 : 1.05;
    else if (a === "rebuilder" && (p.pos === "QB" || p.pos === "TE")) bias = 1.10;
    else if (a === "contender" && p.pos === "RB") bias = 1.08;
    const noise = 1 + (Math.random() * 0.06 - 0.03);
    return { ...p, pickValue: p.adjValue * bias * noise };
  });

  const topTier = biased[0]?.tier;
  const sameTier = biased.filter(p => p.tier === topTier);
  const other = biased.filter(p => p.tier !== topTier);
  for (let i = sameTier.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [sameTier[i], sameTier[j]] = [sameTier[j], sameTier[i]];
  }
  const final = [...sameTier, ...other].sort((a, b) => b.pickValue - a.pickValue);
  const pick = final[0];
  if (pick.tier > sorted[0].tier + 1) return sorted[0];
  return pick;
}

function calculateDraftGrade(userPicks, allPicks, leagueSize, board) {
  let totalValue = 0, expectedValue = 0;
  userPicks.forEach(pick => {
    totalValue += pick.player.adjValue;
    const exp = board.find(p => p.adjRank === pick.overall);
    expectedValue += exp ? exp.adjValue : 0;
  });
  const r = expectedValue > 0 ? totalValue / expectedValue : 1;
  if (r >= 1.15) return "A+";
  if (r >= 1.08) return "A";
  if (r >= 1.02) return "A-";
  if (r >= 0.97) return "B+";
  if (r >= 0.92) return "B";
  if (r >= 0.87) return "B-";
  if (r >= 0.80) return "C+";
  if (r >= 0.73) return "C";
  if (r >= 0.65) return "C-";
  return "D";
}

function Pills({ opts, val, set, sm }) {
  return (
    <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
      {opts.map(([v, label]) => {
        const on = v === val;
        return (
          <button key={String(v)} onClick={() => set(v)} style={{
            padding: sm ? "4px 9px" : "6px 14px", borderRadius: 7, cursor: "pointer",
            border: on ? "1px solid #7c3aed" : "1px solid rgba(148,163,184,0.15)",

            color: on ? "#c084fc" : "#94a3b8", fontSize: sm ? 11 : 12, fontWeight: on ? 600 : 400,
            transition: "all 0.15s",
          }}>{label}</button>
        );
      })}
    </div>
  );
}

function Sel({ label, val, set, opts }) {

function DraftScreen({ settings, onComplete }) {
  const board = useMemo(() => buildAdjustedBoard(settings), []);
  const profiles = useMemo(() => generateTeamProfiles(settings.leagueSize, settings.draftSlot), []);
  const order = useMemo(() => generateDraftOrder(settings.leagueSize, settings.numRounds), []);

  // Use refs for mutable draft state to avoid stale closures in setTimeout
  const picksRef = useRef([]);
  const idxRef = useRef(0);
  const skipRef = useRef(false);
  const timerRef = useRef(null);
  const histRef = useRef(null);
  const completedRef = useRef(false);

  // React state for rendering only
  const [picks, setPicks] = useState([]);
  const [idx, setIdx] = useState(0);
  const [posFilter, setPosFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const [tab, setTab] = useState("board");
  const [skip, setSkip] = useState(false);

  const done = idx >= order.length;
  const slot = order[idx];
  const isUser = slot && slot.team === settings.draftSlot;

  const drafted = useMemo(() => new Set(picks.map(p => p.player.name)), [picks]);
  const avail = useMemo(() => board.filter(p => !drafted.has(p.name)), [board, drafted]);
  const filtered = useMemo(() => {
    let l = avail;
    if (posFilter !== "ALL") l = l.filter(p => p.pos === posFilter);
    if (search) { const q = search.toLowerCase(); l = l.filter(p => p.name.toLowerCase().includes(q)); }
    return l.sort((a, b) => b.adjValue - a.adjValue);
  }, [avail, posFilter, search]);
  const myPicks = useMemo(() => picks.filter(p => p.team === settings.draftSlot), [picks]);

  useEffect(() => { if (histRef.current) histRef.current.scrollTop = histRef.current.scrollHeight; }, [picks.length]);

  // Sync skip state to ref
  useEffect(() => { skipRef.current = skip; }, [skip]);

  // Core AI pick function — reads from refs, writes to refs + state
  const makeAIPick = useCallback(() => {
    const curIdx = idxRef.current;
    if (curIdx >= order.length) return;
    const curSlot = order[curIdx];
    if (!curSlot || curSlot.team === settings.draftSlot) return;

    const prof = profiles.find(t => t.team === curSlot.team);
    const draftedNames = new Set(picksRef.current.map(pk => pk.player.name));
    const available = board.filter(p => !draftedNames.has(p.name));
    const picked = aiMakePick(available, prof, settings);
    if (!picked) return;

    const newPick = { ...curSlot, player: picked, anim: true };
    picksRef.current = [...picksRef.current, newPick];
    idxRef.current = curIdx + 1;

    // Update React state
    setPicks([...picksRef.current]);
    setIdx(idxRef.current);
  }, [order, board, profiles, settings]);

  // AI loop — schedules next AI pick if it's not the user's turn
  const scheduleNextAI = useCallback(() => {
    clearTimeout(timerRef.current);
    const curIdx = idxRef.current;
    if (curIdx >= order.length) return;
    const curSlot = order[curIdx];
    if (!curSlot || curSlot.team === settings.draftSlot) {
      // It's the user's turn — reset skip
      setSkip(false);
      skipRef.current = false;
      return;
    }

    const delay = skipRef.current ? 25 : 550;
    timerRef.current = setTimeout(() => {
      makeAIPick();
      scheduleNextAI();
    }, delay);
  }, [order, settings.draftSlot, makeAIPick]);

  // Start the AI loop whenever idx changes (after user pick or on mount)
  useEffect(() => {
    if (done) return;
    if (!isUser) {
      scheduleNextAI();
    }
    return () => clearTimeout(timerRef.current);
  }, [idx, done, isUser, scheduleNextAI]);

  // Handle skip button — immediately restart the loop with fast timing
  useEffect(() => {
    if (skip && !isUser && !done) {
      clearTimeout(timerRef.current);
      scheduleNextAI();
    }
  }, [skip]);

  // Draft completion
  useEffect(() => {
    if (done && picks.length > 0 && !completedRef.current) {
      completedRef.current = true;
      onComplete(picks, board, settings);
    }
  }, [done, picks]);

  const userPick = (player) => {
    if (!isUser) return;
    const newPick = { ...slot, player, anim: true };
    picksRef.current = [...picksRef.current, newPick];
    idxRef.current = idxRef.current + 1;
    setPicks([...picksRef.current]);
    setIdx(idxRef.current);
  };

  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", h); return () => window.removeEventListener("resize", h);
  }, []);

  const roundDisp = slot ? "Round " + slot.round : "Complete";
  const pickDisp = slot ? fmtPick(slot.round, slot.pick) : "";

  // Sub-panels
  const HistoryPanel = (
    <div ref={histRef} style={{ flex: 1, overflowY: "auto", padding: "0 3px" }}>
      {!picks.length && <div style={{ textAlign: "center", color: "#4a5568", fontSize: 12, marginTop: 28 }}>Picks appear here...</div>}
      {picks.map((p, i) => <PickCard key={i} pick={p} isUser={p.team === settings.draftSlot} anim={p.anim && i === picks.length - 1} />)}
    </div>
  );

  const BoardPanel = (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      {isUser && (
        <div style={{
          background: "linear-gradient(135deg, rgba(124,58,237,0.25), rgba(99,102,241,0.15))",
          border: "1px solid rgba(124,58,237,0.35)", borderRadius: 8, padding: "9px 12px",
          marginBottom: 8, textAlign: "center", animation: "pulseGlow 2s infinite",
        }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#c084fc" }}>YOUR PICK</div>
          <div style={{ fontSize: 10.5, color: "#a78bfa" }}>Pick {pickDisp} — Select a player below</div>
        </div>
      )}
      {!isUser && !done && (
        <button onClick={() => setSkip(true)} disabled={skip} style={{
          padding: "5px 12px", borderRadius: 6, border: "1px solid rgba(124,58,237,0.25)",
          background: skip ? "rgba(124,58,237,0.08)" : "rgba(124,58,237,0.15)",
          color: skip ? "#4a5568" : "#a78bfa", fontSize: 11.5, fontWeight: 600,
          cursor: skip ? "default" : "pointer", marginBottom: 8, alignSelf: "center",
        }}>{skip ? "Skipping..." : "Skip to My Pick ⏭"}</button>
      )}
      <div style={{ display: "flex", gap: 5, alignItems: "center", marginBottom: 7, flexWrap: "wrap" }}>
        <input type="text" placeholder="Search players..." value={search} onChange={e => setSearch(e.target.value)}
          style={{ flex: 1, minWidth: 100, padding: "5px 9px", borderRadius: 6, border: "1px solid rgba(148,163,184,0.15)", background: "rgba(255,255,255,0.05)", color: "#e2e8f0", fontSize: 11.5 }}
        />
        {["ALL","QB","RB","WR","TE"].map(f => (
          <button key={f} onClick={() => setPosFilter(f)} style={{
            padding: "3px 9px", borderRadius: 5, fontSize: 10.5, fontWeight: 600, cursor: "pointer",
            border: posFilter === f ? "1px solid " + (f === "ALL" ? "#7c3aed" : POS_COLORS[f]?.border) : "1px solid rgba(148,163,184,0.1)",
            background: posFilter === f ? (f === "ALL" ? "rgba(124,58,237,0.2)" : POS_COLORS[f]?.bg) : "transparent",
            color: posFilter === f ? (f === "ALL" ? "#c084fc" : POS_COLORS[f]?.text) : "#4a5568",
          }}>{f}</button>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: "auto" }}>
        {filtered.map(p => <PlayerRow key={p.name} player={p} onPick={userPick} active={isUser} />)}
        {!filtered.length && <div style={{ textAlign: "center", color: "#4a5568", fontSize: 12, marginTop: 18 }}>No players available</div>}
      </div>
    </div>
  );

  const TeamPanel = (
    <div style={{ padding: "0 3px" }}>
      {!myPicks.length && <div style={{ textAlign: "center", color: "#4a5568", fontSize: 12, marginTop: 28 }}>Your picks appear here...</div>}
      {myPicks.map((p, i) => {
        const pc = POS_COLORS[p.player.pos];
        return (
          <div key={i} style={{
            display: "flex", alignItems: "center", gap: 7, padding: "7px 9px", borderRadius: 7, marginBottom: 3,
            background: "rgba(124,58,237,0.08)", border: "1px solid rgba(124,58,237,0.15)",
          }}>
            <span style={{ fontSize: 9.5, color: "#7c3aed", fontWeight: 700, width: 28 }}>{fmtPick(p.round, p.pick)}</span>
            <span style={{ fontSize: 8.5, fontWeight: 700, padding: "1px 5px", borderRadius: 3, background: pc.bg, color: pc.text, border: "1px solid " + pc.border }}>{p.player.pos}</span>
            <span style={{ flex: 1, fontSize: 12, fontWeight: 600, color: "#e2e8f0" }}>{p.player.name}</span>
            <span style={{ fontSize: 10.5, color: "#a78bfa", fontWeight: 600 }}>{p.player.adjValue.toLocaleString()}</span>
          </div>
        );
      })}
    </div>
  );

  const header = (
    <div style={{
      padding: "9px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)",
      display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 15, fontWeight: 800, ...S.gradText }}>Dynasty Mock Draft</span>
        {!mobile && <span style={{ fontSize: 11, color: "#4a5568" }}>
          {settings.superflex ? "SF" : "1QB"} • {settings.leagueSize}T • {settings.scoring === "half_ppr" ? "½PPR" : settings.scoring === "ppr" ? "PPR" : settings.scoring === "standard" ? "Std" : "Custom"}
          {settings.tePremium !== "off" ? " • " + settings.tePremium.toUpperCase() : ""}
        </span>}
      </div>
      <div style={{ textAlign: "right" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#c084fc" }}>{roundDisp}</div>
        <div style={{ fontSize: 10, color: "#94a3b8" }}>{pickDisp}{slot ? " • Team " + slot.team : ""}</div>
      </div>
    </div>
  );

  // MOBILE
  if (mobile) {
    return (
      <div style={{ height: "100vh", display: "flex", flexDirection: "column", ...S.page }}>
        {header}
        <div style={{ display: "flex", borderBottom: "1px solid rgba(255,255,255,0.06)", flexShrink: 0 }}>
          {[["board","Draft Board"],["myteam","My Team ("+myPicks.length+")"],["history","History"]].map(([k,l]) => (
            <button key={k} onClick={() => setTab(k)} style={{
              flex: 1, padding: "7px 0", border: "none", cursor: "pointer",
              borderBottom: tab === k ? "2px solid #7c3aed" : "2px solid transparent",
              background: "transparent", color: tab === k ? "#c084fc" : "#4a5568", fontSize: 11.5, fontWeight: 600,
            }}>{l}</button>
          ))}
        </div>
        <div style={{ flex: 1, overflow: "hidden", padding: "8px 10px", display: "flex", flexDirection: "column" }}>
          {tab === "board" && BoardPanel}
          {tab === "myteam" && <div style={{ flex: 1, overflowY: "auto" }}>{TeamPanel}</div>}
          {tab === "history" && HistoryPanel}
        </div>
      </div>
    );
  }

  // DESKTOP
  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", ...S.page }}>
      {header}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        <div style={{ width: 255, borderRight: "1px solid rgba(255,255,255,0.06)", display: "flex", flexDirection: "column", flexShrink: 0 }}>
          <div style={{ padding: "9px 10px 5px", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "#4a5568" }}>Pick History</div>
          {HistoryPanel}
        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "8px 14px", overflow: "hidden" }}>
          {BoardPanel}
        </div>
        <div style={{ width: 235, borderLeft: "1px solid rgba(255,255,255,0.06)", display: "flex", flexDirection: "column", flexShrink: 0 }}>
          <div style={{ padding: "9px 10px 5px", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, color: "#7c3aed" }}>My Team ({myPicks.length})</div>
          <div style={{ flex: 1, overflowY: "auto" }}>{TeamPanel}</div>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// RESULTS SCREEN
// ============================================================================
function ResultsScreen({ picks, board, settings, onAgain }) {
  const [copied, setCopied] = useState(false);
  const myPicks = picks.filter(p => p.team === settings.draftSlot);
  const grade = calculateDraftGrade(myPicks, picks, settings.leagueSize, board);
  const total = myPicks.reduce((s, p) => s + p.player.adjValue, 0);
  const fmt = settings.superflex ? "SF" : "1QB";
  const scr = settings.scoring === "ppr" ? "PPR" : settings.scoring === "half_ppr" ? "Half PPR" : settings.scoring === "standard" ? "Standard" : settings.customPPR + " PPR";
  const tep = settings.tePremium !== "off" ? " | " + settings.tePremium.toUpperCase() : "";

  const txt = "Dynasty Rookie Mock Draft Results\n"
    + settings.leagueSize + "-team " + fmt + " | " + scr + tep + " | " + settings.numRounds + " rounds\n"
    + "Draft slot: " + settings.draftSlot + "\n\n"
    + myPicks.map(p => fmtPick(p.round, p.pick) + " — " + p.player.name + ", " + p.player.pos + " (Value: " + p.player.adjValue + ")").join("\n")
    + "\n\nTotal Value: " + total.toLocaleString() + " | Grade: " + grade
    + "\nMock drafted on RotoWire.com";

  const copy = () => { navigator.clipboard.writeText(txt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }).catch(() => {}); };
  const gc = grade[0] === "A" ? "#34d399" : grade[0] === "B" ? "#60a5fa" : grade[0] === "C" ? "#fbbf24" : "#f87171";

  return (
    <div style={{ ...S.page, padding: "24px 16px", overflowY: "auto" }}>
      <div style={{ maxWidth: 540, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <h1 style={{ fontSize: 23, fontWeight: 800, margin: "0 0 4px", ...S.gradText }}>Draft Complete</h1>
          <p style={{ color: "#94a3b8", fontSize: 11.5, margin: 0 }}>
            {settings.leagueSize}-team {fmt} | {scr}{tep} | Slot {settings.draftSlot}
          </p>
        </div>

        <div style={{
          textAlign: "center", padding: 18, borderRadius: 12,
          background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", marginBottom: 18,
        }}>
          <div style={{ fontSize: 52, fontWeight: 900, color: gc, lineHeight: 1 }}>{grade}</div>
          <div style={{ fontSize: 11.5, color: "#94a3b8", marginTop: 3 }}>Draft Grade</div>
          <div style={{ fontSize: 13, color: "#a78bfa", fontWeight: 600, marginTop: 6 }}>Total Value: {total.toLocaleString()}</div>
        </div>

        <div style={{ marginBottom: 18 }}>
          {myPicks.map((p, i) => {
            const pc = POS_COLORS[p.player.pos];
            return (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 9, padding: "9px 11px", borderRadius: 7, marginBottom: 3,
                background: "rgba(124,58,237,0.08)", border: "1px solid rgba(124,58,237,0.15)",
              }}>
                <span style={{ fontSize: 10.5, color: "#7c3aed", fontWeight: 700, width: 32 }}>{fmtPick(p.round, p.pick)}</span>
                <span style={{ fontSize: 9.5, fontWeight: 700, padding: "2px 7px", borderRadius: 4, background: pc.bg, color: pc.text, border: "1px solid " + pc.border }}>{p.player.pos}</span>
                <span style={{ flex: 1, fontSize: 13.5, fontWeight: 600, color: "#e2e8f0" }}>{p.player.name}</span>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11.5, fontWeight: 600, color: "#a78bfa" }}>{p.player.adjValue.toLocaleString()}</div>
                  <div style={{ fontSize: 8.5, color: TIER_COLORS[p.player.tier] || "#4a5568", fontWeight: 600 }}>T{p.player.tier}</div>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: 9 }}>
          <button onClick={copy} style={{
            flex: 1, padding: "11px 0", borderRadius: 8, border: "1px solid rgba(124,58,237,0.3)",
            background: "rgba(124,58,237,0.1)", color: "#c084fc", fontSize: 12.5, fontWeight: 600, cursor: "pointer",
          }}>{copied ? "✓ Copied!" : "Copy to Clipboard"}</button>
          <button onClick={onAgain} style={{
            flex: 1, padding: "11px 0", borderRadius: 8, border: "none",
            background: "linear-gradient(135deg, #7c3aed, #6d28d9)", color: "#fff",
            fontSize: 12.5, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 16px rgba(124,58,237,0.3)",
          }}>Draft Again</button>
        </div>

        <div style={{ textAlign: "center", marginTop: 16, fontSize: 10, color: "#4a5568" }}>Powered by RotoWire</div>
      </div>
    </div>
  );
}

// ============================================================================
// APP
// ============================================================================
function App() {
  const [phase, setPhase] = useState("setup");
  const [settings, setSettings] = useState(null);
  const [result, setResult] = useState(null);
  const [draftKey, setDraftKey] = useState(0);

  const start = useCallback(s => { setSettings(s); setDraftKey(k => k + 1); setPhase("draft"); }, []);
  const complete = useCallback((picks, board, s) => { setResult({ picks, board, settings: s }); setPhase("results"); }, []);
  const again = useCallback(() => { setResult(null); setPhase("setup"); }, []);

  if (phase === "setup") return <SetupScreen onStart={start} initialSettings={settings} />;
  if (phase === "draft") return <DraftScreen key={draftKey} settings={settings} onComplete={complete} />;
  if (phase === "results" && result) return <ResultsScreen picks={result.picks} board={result.board} settings={result.settings} onAgain={again} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
