// ============================================================================
// HELPERS
// ============================================================================
function weightedRandomArchetype() {
  const r = Math.random();
  let c = 0;
  for (const a of ARCHETYPES) { c += a.weight; if (r <= c) return a.id; }
  return "balanced";
}

function fmtPick(round, pick) {
  return round + "." + String(pick).padStart(2, "0");
}

// Centralised check: does this draft slot belong to the user?
// Works for both default (single slot) and custom (multi-pick) modes.
function checkIsUserSlot(slot, settings) {
  if (!slot) return false;
  if (settings.customPicksEnabled && settings.userPicks && settings.userPicks.length > 0) {
    return settings.userPicks.some(p => p.round === slot.round && p.pick === slot.pick);
  }
  return slot.team === settings.draftSlot;
}

// ============================================================================
// DRAFT ENGINE
// ============================================================================
function buildAdjustedBoard(settings) {
  let players = SUPERFLEX_RANKINGS.map(p => ({ ...p, adjValue: p.value }));

  if (!settings.superflex) {
    players = players.map(p => p.pos === "QB" ? { ...p, adjValue: Math.round(p.value * 0.55) } : p);
  }
  if (settings.scoring === "ppr") {
    players = players.map(p => {
      if (p.pos === "WR") return { ...p, adjValue: Math.round(p.adjValue * 1.05) };
      if (p.pos === "RB") return { ...p, adjValue: Math.round(p.adjValue * 1.03) };
      return p;
    });
  } else if (settings.scoring === "standard") {
    players = players.map(p => p.pos === "RB" ? { ...p, adjValue: Math.round(p.adjValue * 1.07) } : p);
  }

  const tepMult = { off: 1, "te+": 1.20, "te++": 1.40, "te+++": 1.60 }[settings.tePremium] || 1;
  if (tepMult > 1) players = players.map(p => p.pos === "TE" ? { ...p, adjValue: Math.round(p.adjValue * tepMult) } : p);

  if (settings.numWR === 3)
    players = players.map(p => (p.pos === "WR" && p.rank >= 8 && p.rank <= 30) ? { ...p, adjValue: Math.round(p.adjValue * 1.08) } : p);
  if (settings.numRB === 2)
    players = players.map(p => p.pos === "RB" ? { ...p, adjValue: Math.round(p.adjValue * 1.05) } : p);
  if (settings.numFlex === 2)
    players = players.map(p => ((p.pos === "WR" || p.pos === "RB") && p.rank >= 15 && p.rank <= 40) ? { ...p, adjValue: Math.round(p.adjValue * 1.03) } : p);

  players.sort((a, b) => b.adjValue - a.adjValue);
  return players.map((p, i) => ({ ...p, adjRank: i + 1 }));
}

function generateTeamProfiles(leagueSize, userSlot) {
  const profiles = [];
  for (let i = 1; i <= leagueSize; i++) {
    profiles.push(i === userSlot
      ? { team: i, isUser: true,  archetype: null,                    aggressiveness: 0           }
      : { team: i, isUser: false, archetype: weightedRandomArchetype(), aggressiveness: Math.random() }
    );
  }
  return profiles;
}

function generateDraftOrder(leagueSize, numRounds) {
  const order = [];
  for (let r = 1; r <= numRounds; r++) {
    for (let p = 1; p <= leagueSize; p++) order.push({ round: r, pick: p, team: p });
  }
  return order.map((o, i) => ({ ...o, overall: i + 1 }));
}

function aiMakePick(available, profile, settings) {
  if (!available.length) return null;
  const sorted = [...available].sort((a, b) => b.adjValue - a.adjValue);

  let windowSize = 5;
  if (profile.aggressiveness < 0.3) windowSize = 3;
  else if (profile.aggressiveness > 0.7) windowSize = 8;
  const win = sorted.slice(0, Math.min(windowSize, sorted.length));

  const biased = win.map(p => {
    let bias = 1.0;
    const a = profile.archetype;
    if (a === "rb_needy"  && p.pos === "RB") bias = 1.15;
    else if (a === "wr_needy"  && p.pos === "WR") bias = 1.10;
    else if (a === "qb_needy"  && p.pos === "QB") bias = settings.superflex ? 1.25 : 1.05;
    else if (a === "rebuilder" && (p.pos === "QB" || p.pos === "TE")) bias = 1.10;
    else if (a === "contender" && p.pos === "RB") bias = 1.08;
    const noise = 1 + (Math.random() * 0.06 - 0.03);
    return { ...p, pickValue: p.adjValue * bias * noise };
  });

  const topTier = biased[0]?.tier;
  const sameTier = biased.filter(p => p.tier === topTier);
  const other    = biased.filter(p => p.tier !== topTier);
  for (let i = sameTier.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [sameTier[i], sameTier[j]] = [sameTier[j], sameTier[i]];
  }
  const final = [...sameTier, ...other].sort((a, b) => b.pickValue - a.pickValue);
  const pick = final[0];
  if (pick.tier > sorted[0].tier + 1) return sorted[0];
  return pick;
}

function calculateDraftGrade(userPicks, allPicks, leagueSize, board) {
  let totalValue = 0, expectedValue = 0;
  userPicks.forEach(pick => {
    totalValue += pick.player.adjValue;
    const exp = board.find(p => p.adjRank === pick.overall);
    expectedValue += exp ? exp.adjValue : 0;
  });
  const r = expectedValue > 0 ? totalValue / expectedValue : 1;
  if (r >= 1.15) return "A+";
  if (r >= 1.08) return "A";
  if (r >= 1.02) return "A-";
  if (r >= 0.97) return "B+";
  if (r >= 0.92) return "B";
  if (r >= 0.87) return "B-";
  if (r >= 0.80) return "C+";
  if (r >= 0.73) return "C";
  if (r >= 0.65) return "C-";
  return "D";
}

  const { leagueSize, numRounds, draftSlot, userPicks } = s;
  const picks = userPicks || [];

  const isSelected = (round, pick) => picks.some(p => p.round === round && p.pick === pick);
  const isDefaultSlot = (pick) => pick === draftSlot;

  const togglePick = (round, pick) => {
    const exists = picks.some(p => p.round === round && p.pick === pick);
    const next = exists
      ? picks.filter(p => !(p.round === round && p.pick === pick))
      : [...picks, { round, pick }];
    up("userPicks", next);

  const selectedCount = picks.length;

    <div style={{
      background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)",

        Click any pick to add or remove it. Your default slot ({draftSlot}) is pre-selected each round.
        {selectedCount === 0 && (
          <span style={{ color: "#f87171", marginLeft: 6, fontWeight: 600 }}>Select at least 1 pick.</span>

      </div>

      {/* Grid — horizontally scrollable for large leagues */}
      <div style={{ overflowX: "auto", paddingBottom: 4 }}>
        <table style={{ borderCollapse: "separate", borderSpacing: "3px 3px", minWidth: "max-content" }}>
          <thead>
            <tr>
              {/* Empty corner cell */}
              <th style={{ width: 30, fontSize: 10, color: "#64748b", fontWeight: 600, textAlign: "left", paddingRight: 6, paddingBottom: 4 }}></th>
              {Array.from({ length: leagueSize }, (_, i) => (
                <th key={i + 1} style={{
                  width: 38, fontSize: 10, fontWeight: 700, textAlign: "center", paddingBottom: 4,
                  color: i + 1 === draftSlot ? "#a78bfa" : "#64748b",
                }}>
                  {i + 1 === draftSlot ? `★${i + 1}` : i + 1}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {Array.from({ length: numRounds }, (_, r) => (
              <tr key={r + 1}>
                <td style={{
                  fontSize: 10, fontWeight: 700, color: "#64748b",
                  paddingRight: 6, whiteSpace: "nowrap", verticalAlign: "middle",
                }}>R{r + 1}</td>
                {Array.from({ length: leagueSize }, (_, p) => {
                  const round = r + 1;
                  const pick  = p + 1;
                  const sel   = isSelected(round, pick);
                  const def   = isDefaultSlot(pick);
                  // Color logic:
                  // purple  = user's default slot (selected)
                  // teal    = user's added/traded pick (selected, non-default)
                  // dim     = not selected
                  const bg     = sel ? (def ? "rgba(124,58,237,0.28)" : "rgba(56,189,248,0.22)") : "rgba(255,255,255,0.02)";
                  const border = sel ? (def ? "rgba(124,58,237,0.55)" : "rgba(56,189,248,0.45)")  : "rgba(255,255,255,0.07)";
                  const color  = sel ? (def ? "#c084fc"               : "#38bdf8")                : "#64748b";

                  return (
                    <td key={pick} style={{ padding: "2px", verticalAlign: "middle" }}>
                      <button
                        type="button"
                        onClick={() => togglePick(round, pick)}
                        title={sel ? `Remove ${fmtPick(round, pick)}` : `Add ${fmtPick(round, pick)}`}
                        style={{
                          display: "block", width: "100%", padding: "4px 2px", textAlign: "center",

                          fontFamily: "inherit", lineHeight: 1.4,
                        }}>
                        {fmtPick(round, pick)}

function DraftScreen({ settings, onComplete, onBack }) {
  const board    = useMemo(() => buildAdjustedBoard(settings), []);
  const profiles = useMemo(() => generateTeamProfiles(settings.leagueSize, settings.draftSlot), []);
  const order    = useMemo(() => generateDraftOrder(settings.leagueSize, settings.numRounds), []);

  const picksRef    = useRef([]);
  const idxRef      = useRef(0);
  const skipRef     = useRef(false);
  const timerRef    = useRef(null);
  const histRef     = useRef(null);
  const completedRef = useRef(false);

  const [picks, setPicks]       = useState([]);
  const [idx, setIdx]           = useState(0);
  const [posFilter, setPosFilter] = useState("ALL");
  const [search, setSearch]     = useState("");
  const [tab, setTab]           = useState("board");
  const [skip, setSkip]         = useState(false);
  const [showBackConfirm, setShowBackConfirm] = useState(false);

  const done   = idx >= order.length;
  const slot   = order[idx];

  // ── Core user-slot check — respects custom picks ─────────────────────────
  const isUser = checkIsUserSlot(slot, settings);

  const drafted  = useMemo(() => new Set(picks.map(p => p.player.name)), [picks]);
  const avail    = useMemo(() => board.filter(p => !drafted.has(p.name)), [board, drafted]);
  const filtered = useMemo(() => {
    let l = avail;
    if (posFilter !== "ALL") l = l.filter(p => p.pos === posFilter);
    if (search) { const q = search.toLowerCase(); l = l.filter(p => p.name.toLowerCase().includes(q)); }
    return l.sort((a, b) => b.adjValue - a.adjValue);
  }, [avail, posFilter, search]);

  // myPicks: all picks the user controls — accounts for custom pick sets
  const myPicks = useMemo(() => picks.filter(p => checkIsUserSlot(p, settings)), [picks]);

  useEffect(() => { if (histRef.current) histRef.current.scrollTop = histRef.current.scrollHeight; }, [picks.length]);
  useEffect(() => { skipRef.current = skip; }, [skip]);

  const makeAIPick = useCallback(() => {
    const curIdx  = idxRef.current;
    if (curIdx >= order.length) return;
    const curSlot = order[curIdx];
    // Skip if this slot belongs to the user (handles custom picks too)
    if (!curSlot || checkIsUserSlot(curSlot, settings)) return;

    const prof      = profiles.find(t => t.team === curSlot.team);
    const draftedNm = new Set(picksRef.current.map(pk => pk.player.name));
    const available = board.filter(p => !draftedNm.has(p.name));
    const picked    = aiMakePick(available, prof, settings);
    if (!picked) return;

    const newPick = { ...curSlot, player: picked, anim: true };
    picksRef.current = [...picksRef.current, newPick];
    idxRef.current   = curIdx + 1;
    setPicks([...picksRef.current]);
    setIdx(idxRef.current);
  }, [order, board, profiles, settings]);

  const scheduleNextAI = useCallback(() => {
    clearTimeout(timerRef.current);
    const curIdx  = idxRef.current;
    if (curIdx >= order.length) return;
    const curSlot = order[curIdx];
    // Stop scheduling if it's now the user's turn
    if (!curSlot || checkIsUserSlot(curSlot, settings)) {
      setSkip(false);
      skipRef.current = false;
      return;
    }
    const delay = skipRef.current ? 25 : 550;
    timerRef.current = setTimeout(() => { makeAIPick(); scheduleNextAI(); }, delay);
  }, [order, settings, makeAIPick]);

  useEffect(() => {
    if (done) return;
    if (!isUser) { scheduleNextAI(); }
    return () => clearTimeout(timerRef.current);
  }, [idx, done, isUser, scheduleNextAI]);

  useEffect(() => {
    if (skip && !isUser && !done) { clearTimeout(timerRef.current); scheduleNextAI(); }
  }, [skip]);

  useEffect(() => {
    if (done && picks.length > 0 && !completedRef.current) {
      completedRef.current = true;
      onComplete(picks, board, settings);
    }
  }, [done, picks]);

  const userPick = (player) => {
    if (!isUser) return;
    const newPick = { ...slot, player, anim: true };
    picksRef.current = [...picksRef.current, newPick];
    idxRef.current   = idxRef.current + 1;
    setPicks([...picksRef.current]);
    setIdx(idxRef.current);
  };

  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", h); return () => window.removeEventListener("resize", h);
  }, []);

  const roundDisp = slot ? "Round " + slot.round : "Complete";
  const pickDisp  = slot ? fmtPick(slot.round, slot.pick) : "";

  // ── Sub-panels ────────────────────────────────────────────────────────────
  const HistoryPanel = (
    <div ref={histRef} style={{ flex: 1, overflowY: "auto", padding: "0 3px" }}>
      {!picks.length && <div style={{ textAlign: "center", color: "#64748b", fontSize: 12, marginTop: 28 }}>Picks appear here...</div>}
      {picks.map((p, i) => (
        <PickCard key={i} pick={p}
          isUser={checkIsUserSlot(p, settings)}
          anim={p.anim && i === picks.length - 1} />
      ))}
    </div>
  );

  const BoardPanel = (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      {isUser && (
        <div style={{
          background: "linear-gradient(135deg, rgba(124,58,237,0.25), rgba(99,102,241,0.15))",
          border: "1px solid rgba(124,58,237,0.35)", borderRadius: 8, padding: "9px 12px",
          marginBottom: 8, textAlign: "center", animation: "pulseGlow 2s infinite",
        }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#c084fc" }}>YOUR PICK</div>
          <div style={{ fontSize: 11, color: "#a78bfa" }}>Pick {pickDisp} — Select a player below</div>
        </div>
      )}
      {!isUser && !done && (
        <button onClick={() => setSkip(true)} disabled={skip} style={{
          padding: "6px 12px", borderRadius: 6, border: "1px solid rgba(124,58,237,0.25)",
          background: skip ? "rgba(124,58,237,0.08)" : "rgba(124,58,237,0.15)",
          color: skip ? "#64748b" : "#a78bfa", fontSize: 12, fontWeight: 600,
          cursor: skip ? "default" : "pointer", marginBottom: 8, alignSelf: "center",
        }}>{skip ? "Skipping..." : "Skip to My Pick ⏭"}</button>
      )}
      <div style={{ display: "flex", gap: 5, alignItems: "center", marginBottom: 7, flexWrap: "wrap" }}>
        <input type="text" placeholder="Search players..." value={search} onChange={e => setSearch(e.target.value)}
          style={{ flex: 1, minWidth: 100, padding: "6px 9px", borderRadius: 6, border: "1px solid rgba(148,163,184,0.15)", background: "rgba(255,255,255,0.05)", color: "#e2e8f0", fontSize: 12 }}
        />
        {["ALL","QB","RB","WR","TE"].map(f => (
          <button key={f} onClick={() => setPosFilter(f)} style={{
            padding: "4px 9px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",
            border: posFilter === f ? "1px solid " + (f === "ALL" ? "#7c3aed" : POS_COLORS[f]?.border) : "1px solid rgba(148,163,184,0.1)",
            background: posFilter === f ? (f === "ALL" ? "rgba(124,58,237,0.2)" : POS_COLORS[f]?.bg) : "transparent",
            color: posFilter === f ? (f === "ALL" ? "#c084fc" : POS_COLORS[f]?.text) : "#64748b",
          }}>{f}</button>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: "auto" }}>
        {filtered.map(p => <PlayerRow key={p.name} player={p} onPick={userPick} active={isUser} />)}
        {!filtered.length && <div style={{ textAlign: "center", color: "#64748b", fontSize: 12, marginTop: 18 }}>No players available</div>}
      </div>
    </div>
  );

  const TeamPanel = (
    <div style={{ padding: "0 3px" }}>
      {!myPicks.length && <div style={{ textAlign: "center", color: "#64748b", fontSize: 12, marginTop: 28 }}>Your picks appear here...</div>}
      {myPicks.map((p, i) => {
        const pc = POS_COLORS[p.player.pos];
        return (
          <div key={i} style={{

          }}>

            <span style={{ fontSize: 11, fontWeight: 700, padding: "1px 5px", borderRadius: 3, background: pc.bg, color: pc.text, border: "1px solid " + pc.border }}>{p.player.pos}</span>
            <span style={{ flex: 1, fontSize: 12, fontWeight: 600, color: "#e2e8f0" }}>{p.player.name}</span>

          </div>
        );
      })}
    </div>

  // Header — back button + logo + badge pick counter
  const header = (
    <div style={{
      padding: "9px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)",
      display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0,

      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>

        <RotoWireLogo size="sm" />

// COMMUNITY ADP — Google Sheets backend (real-time, cross-user)
//                 Falls back to localStorage, then synthetic seed if offline
// ============================================================================
const ADP_KEY      = "rw_community_adp_v1";
const API_BASE_URL = "https://script.google.com/macros/s/AKfycbyfcTVbqInFM48UUFgOzlibyQUJ-N2wBh0gNWwemtrGmTKc3FKxPYsb1ajAmjwxwzbh/exec";

// Park-Miller LCG — deterministic RNG, used only for synthetic fallback seed
function mkRng(seed) {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}

// Synthetic seed — only used when API is unreachable AND localStorage is empty
function generateSeedADP() {
  const rng    = mkRng(2026);
  const DRAFTS = 423;
  const PICKS  = 60;
  const meta   = { totalDrafts: DRAFTS };
  const players = {};
  SUPERFLEX_RANKINGS.forEach(p => { players[p.name] = { pos: p.pos, draftCount: 0, sumOvr: 0 }; });
  for (let d = 0; d < DRAFTS; d++) {
    const sorted = SUPERFLEX_RANKINGS
      .map(p => ({ name: p.name, key: p.rank + (rng() - 0.5) * Math.max(2, p.rank * 0.4) }))
      .sort((a, b) => a.key - b.key);
    sorted.slice(0, PICKS).forEach((entry, i) => {
      players[entry.name].draftCount++;
      players[entry.name].sumOvr += i + 1;
    });
  }
  return { meta, players };
}

// Convert Google Sheets API response → internal { meta, players } format
// Handles boss's schema: { simCount, players: [{playerName, pos, totalPick, pickCount, ...}] }
function apiResponseToInternal(json) {
  const players = {};
  const rows    = json.players || (json.data && json.data.players) || [];
  rows.forEach(p => {
    const name = p.playerName || p.name;
    if (!name) return;
    players[name] = {
      pos:        p.pos        || "",
      draftCount: Number(p.pickCount)  || 0,
      sumOvr:     Number(p.totalPick)  || 0,
    };
  });
  const totalDrafts = Number(
    json.simCount        || json.totalDrafts ||
    (json.data && (json.data.simCount || json.data.totalDrafts)) || 0
  );
  return { meta: { totalDrafts }, players };
}

// Load ADP: Google Sheets API → localStorage → synthetic seed (priority order)
async function loadADPData() {
  if (API_BASE_URL) {
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 6000);
      const res = await fetch(API_BASE_URL, { signal: controller.signal });
      clearTimeout(tid);
      if (res.ok) {
        const json = await res.json();
        const data = apiResponseToInternal(json);
        if (data.meta.totalDrafts > 0 || Object.keys(data.players).length > 0) {
          try { localStorage.setItem(ADP_KEY, JSON.stringify(data)); } catch (_) {}
          return data;
        }
      }
    } catch (_) {}
  }
  try {
    const raw = localStorage.getItem(ADP_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  const seed = generateSeedADP();
  try { localStorage.setItem(ADP_KEY, JSON.stringify(seed)); } catch (_) {}
  return seed;
}

// Record draft: POST to Google Sheets (fire-and-forget) + update localStorage cache
async function recordDraftToADP(allPicks) {
  if (API_BASE_URL) {
    try {
      fetch(API_BASE_URL, {
        method:  "POST",
        mode:    "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          picks: allPicks.map(p => ({
            playerName: p.player?.name || "",
            pos:        p.player?.pos  || "",
            overall:    p.overall,
            round:      p.round,
            school:     "",
            team:       "",
          })),
        }),
      }).catch(() => {});
    } catch (_) {}
  }
  // Also update localStorage so the board reflects this draft immediately for this user
  try {
    const raw  = localStorage.getItem(ADP_KEY);
    const data = raw ? JSON.parse(raw) : generateSeedADP();
    data.meta.totalDrafts = (data.meta.totalDrafts || 0) + 1;
    allPicks.forEach(pick => {
      const name = pick.player?.name;
      if (!name) return;
      if (!data.players[name]) data.players[name] = { pos: pick.player.pos, draftCount: 0, sumOvr: 0 };
      data.players[name].draftCount++;
      data.players[name].sumOvr += pick.overall;
    });
    localStorage.setItem(ADP_KEY, JSON.stringify(data));
  } catch (_) {}
}

function computeADPBoard(data) {
  const total = data.meta?.totalDrafts || 1;
  return Object.entries(data.players)
    .filter(([, p]) => p.draftCount > 0)
    .map(([name, p]) => ({
      name,
      pos:        p.pos,
      adp:        p.sumOvr / p.draftCount,
      pctDrafted: (p.draftCount / total) * 100,
    }))
    .sort((a, b) => a.adp - b.adp);
}

function App() {
  const [phase, setPhase]     = useState("setup");
  const [settings, setSettings] = useState(null);
  const [result, setResult]   = useState(null);
  const [draftKey, setDraftKey] = useState(0);

  const start    = useCallback(s  => { setSettings(s); setDraftKey(k => k + 1); setPhase("draft"); }, []);
  const complete = useCallback((picks, board, s) => { setResult({ picks, board, settings: s }); setPhase("results"); }, []);
  const again    = useCallback(() => { setResult(null); setPhase("setup"); }, []);
  const back     = useCallback(() => { setPhase("setup"); }, []);

  if (phase === "setup")                return <SetupScreen onStart={start} initialSettings={settings} />;
  if (phase === "draft")                return <DraftScreen key={draftKey} settings={settings} onComplete={complete} onBack={back} />;
  if (phase === "results" && result)    return <ResultsScreen picks={result.picks} board={result.board} settings={result.settings} onAgain={again} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
